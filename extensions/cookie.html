<div class="cky-consent-container cky-box-bottom-left" tabindex="-1" aria-label="We value your privacy" role="region">
    <div class="cky-consent-bar" data-cky-tag="notice" style="border-color: #f4f4f4; background-color: #FFFFFF;">
        <div class="cky-notice">
            <p class="cky-title" aria-level="2" data-cky-tag="title" role="heading" style="color: #242424;">We value your privacy</p>
            <div class="cky-notice-group">
                <div class="cky-notice-des" data-cky-tag="description" style="color: #242424;">
                    <p>We use cookies to enhance your browsing experience, serve personalized ads or content, and analyze our traffic. By clicking "Accept All", you consent to our use of cookies.&nbsp;</p>
                </div>
                <div class="cky-notice-btn-wrapper" data-cky-tag="notice-buttons">
                    <button class="cky-btn cky-btn-customize" aria-label="Customize" aria-haspopup="true" aria-controls="ckyPreferenceCenter" data-cky-tag="settings-button" style="color: #242424; border-color: #242424; background-color: transparent;">Customize</button> 
                    <button class="cky-btn cky-btn-reject" aria-label="Reject All" data-cky-tag="reject-button" style="color: #242424; border-color: #242424; background-color: transparent;">Reject All</button> 
                    <button class="cky-btn cky-btn-accept" aria-label="Accept All" data-cky-tag="accept-button" style="color: #FFFFFF; border-color: #242424; background-color: #242424;">Accept All</button> 
                </div>
            </div>
        </div>
    </div>
</div>
