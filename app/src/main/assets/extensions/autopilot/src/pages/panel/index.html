<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transfeero Autopilot Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #22c55e;
            --danger: #ef4444;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--gray-50);
            color: var(--gray-900);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background: var(--white);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--gray-200);
            box-shadow: var(--shadow);
            z-index: 10;
        }

        header .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .status-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--gray-200);
            color: var(--gray-700);
        }

        .status-badge.online {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }

        .close-btn {
            background: var(--gray-100);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Tabs */
        .tabs-nav {
            display: flex;
            background: var(--white);
            padding: 0 16px;
            border-bottom: 1px solid var(--gray-200);
        }

        .tab-link {
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-500);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }

        .tab-link.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Content Area */
        .content-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            position: relative;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .form-row .form-group { flex: 1; margin-bottom: 0; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-700); margin-bottom: 4px; }
        input, select, textarea {
            width: 100%; padding: 10px; border: 1px solid var(--gray-300); border-radius: 8px;
            font-size: 14px; font-family: inherit; background: var(--white);
        }
        textarea { height: 80px; resize: none; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

        /* Log Section */
        #log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 10px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            height: 200px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #333;
        }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #555; padding-left: 6px; }
        .log-time { color: #888; margin-right: 6px; }
        .log-info { color: #4fc1ff; }
        .log-success { color: #4ec9b0; }
        .log-warn { color: #ce9178; }
        .log-error { color: #f44747; }

        /* Action Bar */
        .footer {
            background: var(--white);
            padding: 16px;
            border-top: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .usage-info {
            display: flex; justify-content: space-between; font-size: 12px; font-weight: 500; color: var(--gray-500);
        }

        .btn-main {
            width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700;
            border: none; transition: all 0.2s; cursor: pointer; color: white;
        }
        .btn-main.stopped { background: var(--gray-700); }
        .btn-main.running { background: var(--success); box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); }

        /* Toggle */
        .toggle-group {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--white); padding: 10px 14px; border-radius: 10px; border: 1px solid var(--gray-200);
        }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-save-mini {
            background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>AUTOPILOT PRO</h1>
            <div id="auth-status" class="status-badge">OFFLINE</div>
        </div>
        <button class="close-btn" id="btnClose">
            <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </header>

    <div class="tabs-nav">
        <a class="tab-link active" data-tab="filters">Filters</a>
        <a class="tab-link" data-tab="settings">Settings</a>
        <a class="tab-link" data-tab="logs">Logs</a>
    </div>

    <div class="content-wrapper">
        <!-- Filters -->
        <div class="tab-content active" id="tab-filters">
            <div class="form-row">
                <div class="form-group"><label>Max Distance (km)</label><input type="number" id="maxDistance" placeholder="999"></div>
                <div class="form-group"><label>Min Price (€)</label><input type="number" id="minPrice" placeholder="0"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Date (From)</label><input type="date" id="dateFrom"></div>
                <div class="form-group"><label>Date (To)</label><input type="date" id="dateTo"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Time (From)</label><input type="time" id="timeFrom"></div>
                <div class="form-group"><label>Time (To)</label><input type="time" id="timeTo"></div>
            </div>
            <div class="form-group">
                <label>Service Class (Comma separated)</label>
                <input type="text" id="serviceClass" placeholder="economy, business, van">
            </div>
            <div class="form-group">
                <label>Coordinations (Target-Start-End-MinPrice)</label>
                <textarea id="coordinations" placeholder="airport-milano-malpensa-50&#10;city-rome-fiumicino-30"></textarea>
            </div>
            <button class="btn-save-mini" onclick="saveData()">Save Filters</button>
        </div>

        <!-- Settings -->
        <div class="tab-content" id="tab-settings">
            <div class="form-group"><label>Refresh Delay (sec)</label><input type="number" id="refreshDelay" value="1.5" step="0.1"></div>
            <div class="form-group"><label>Pause every X searches</label><input type="number" id="pauseEvery" value="100"></div>
            <div class="form-group"><label>Pause for X minutes</label><input type="number" id="pauseDuration" value="5"></div>
            <div class="form-group">
                <div class="toggle-group">
                    <label style="margin:0">Sound Notification</label>
                    <label class="switch"><input type="checkbox" id="soundEnabled" checked><span class="slider"></span></label>
                </div>
            </div>
            <button class="btn-save-mini" onclick="saveData()">Save Settings</button>
        </div>

        <!-- Logs -->
        <div class="tab-content" id="tab-logs">
            <div id="log-container"></div>
            <button class="btn-save-mini" style="margin-top:10px;background:var(--gray-500)" onclick="clearLogs()">Clear Logs</button>
        </div>
    </div>

    <div class="footer">
        <div class="usage-info">
            <span id="user-email">Loading...</span>
            <span id="daily-usage">0 / 0</span>
        </div>
        <button class="btn-main stopped" id="btnStart">START BOT</button>
    </div>

    <script>
        // Constants
        const API_BASE = "https://api.transfeero.com/v3";
        const STORE_API = "https://store.ryankamal.com/api";
        const EXT_ID = "ibhjnfkkiihagmmdcpmicklhdoikdfmj";

        // State
        let botRunning = false;
        let auth = { hash: '', token: '', email: '' };
        let vehicles = [];
        let searchCount = 0;
        let usage = { count: 0, limit: 50 };
        let timer = null;

        // UI Helpers
        function log(msg, type = 'info') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            if (container.children.length > 100) container.removeChild(container.firstChild);
        }

        function clearLogs() { document.getElementById('log-container').innerHTML = ''; }

        // Tab Switching
        document.querySelectorAll('.tab-link').forEach(link => {
            link.addEventListener('click', () => {
                document.querySelectorAll('.tab-link, .tab-content').forEach(el => el.classList.remove('active'));
                link.classList.add('active');
                document.getElementById(`tab-${link.dataset.tab}`).classList.add('active');
            });
        });

        // Bot Functions
        async function fetchAuth() {
            if (window.Android) {
                try {
                    const data = JSON.parse(window.Android.getAuth());
                    auth = data;
                    document.getElementById('user-email').textContent = auth.email || "No Session";
                    if (auth.hash && auth.token) {
                        document.getElementById('auth-status').textContent = "ONLINE";
                        document.getElementById('auth-status').classList.add('online');
                        log("Auth session recovered from browser.", "success");
                        return true;
                    }
                } catch(e) { log("Failed to get auth: " + e.message, "error"); }
            }
            log("No active Transfeero session found. Please login first.", "warn");
            return false;
        }

        async function loadVehicles() {
            if (!auth.hash) return;
            try {
                const res = await fetch(`${API_BASE}/partner_vehicle_list`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ login_hash: auth.hash, limit: "100" })
                });
                const data = await res.json();
                if (data.data && data.data.vehicles) {
                    vehicles = data.data.vehicles;
                    log(`Loaded ${vehicles.length} vehicle classes.`, "info");
                }
            } catch(e) { log("Vehicle fetch failed: " + e.message, "warn"); }
        }

        async function checkSubscription() {
            if (!auth.email) return;
            try {
                const res = await fetch(`${STORE_API}/subscription?extensionId=${EXT_ID}&email=${encodeURIComponent(auth.email)}`);
                const data = await res.json();
                if (data.subscribed) {
                    usage.limit = 999999;
                    log("Subscription active: Unlimited access.", "success");
                } else {
                    log("No subscription found. Daily limit applies.", "warn");
                }
                updateUsageUI();
            } catch(e) {}
        }

        function updateUsageUI() {
            document.getElementById('daily-usage').textContent = `${usage.count} / ${usage.limit === 999999 ? '∞' : usage.limit}`;
        }

        async function botLoop() {
            if (!botRunning) return;

            try {
                log("Scanning for offers...", "info");
                const res = await fetch(`${API_BASE}/partner_ava_bookings_v2`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${auth.token}`
                    },
                    body: JSON.stringify({ login_hash: auth.hash })
                });

                if (res.status === 429) {
                    log("Rate limit (429)! Pausing for 5 min...", "error");
                    stopBot();
                    setTimeout(startBot, 300000);
                    return;
                }

                const data = await res.json();
                const offers = data.data?.bookings || [];
                
                if (offers.length > 0) {
                    log(`Found ${offers.length} active offers.`, "success");
                    await processOffers(offers);
                } else {
                    // log("No matching offers found.", "info");
                }

                searchCount++;
                const pauseEvery = parseInt(document.getElementById('pauseEvery').value) || 100;
                if (searchCount >= pauseEvery) {
                    const pauseMin = parseInt(document.getElementById('pauseDuration').value) || 5;
                    log(`Safety pause: ${pauseMin} min active.`, "warn");
                    searchCount = 0;
                    setTimeout(botLoop, pauseMin * 60000);
                    return;
                }

            } catch(e) { log("Scan error: " + e.message, "error"); }

            const delay = (parseFloat(document.getElementById('refreshDelay').value) || 1.5) * 1000;
            timer = setTimeout(botLoop, delay);
        }

        async function processOffers(offers) {
            const filters = getFilters();
            for (const offer of offers) {
                if (matchFilters(offer, filters)) {
                    log(`MATCH: ${offer.start} -> ${offer.end} (€${offer.partner_payout})`, "success");
                    if (usage.count < usage.limit) {
                        await acceptOffer(offer);
                    } else {
                        log("Daily limit reached! Upgrade to accept more.", "warn");
                    }
                }
            }
        }

        function matchFilters(offer, f) {
            // Price & Distance
            if (f.maxDistance && parseFloat(offer.km) > parseFloat(f.maxDistance)) return false;
            if (f.minPrice && parseFloat(offer.partner_payout) < parseFloat(f.minPrice)) return false;

            // Service Class
            if (f.serviceClass) {
                const classes = f.serviceClass.split(',').map(s => s.trim().toLowerCase());
                if (!classes.includes(offer.vehicle_class.toLowerCase())) return false;
            }

            // Coordinations (Simple match)
            if (f.coordinations) {
                const lines = f.coordinations.split('\n');
                let geoMatch = false;
                for (const line of lines) {
                    const parts = line.split('-').map(p => p.trim().toLowerCase());
                    if (parts.length >= 2) {
                        const startOk = offer.start.toLowerCase().includes(parts[0]);
                        const endOk = offer.end.toLowerCase().includes(parts[1]);
                        if (startOk && endOk) { geoMatch = true; break; }
                    }
                }
                if (!geoMatch && lines.length > 0 && lines[0].trim()) return false;
            }

            return true;
        }

        async function acceptOffer(offer) {
            // Find compatible vehicle
            const v = vehicles.find(vh => vh.type.toLowerCase() === offer.vehicle_class.toLowerCase() && vh.passenger_max >= offer.pax);
            if (!v) { log(`No vehicle ID found for ${offer.vehicle_class}`, "warn"); return; }

            log(`Attempting to accept #${offer.id} with vehicle ${v.name}...`, "info");
            try {
                const res = await fetch(`${API_BASE}/partner_accept_booking`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Authorization': `Bearer ${auth.token}`
                    },
                    body: new URLSearchParams({
                        login_hash: auth.hash,
                        booking_hash: offer.booking_hash_link,
                        vehicle_id: v.id
                    })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    log(`✅ SUCCESSFULLY ACCEPTED OFFER #${offer.id}!`, "success");
                    usage.count++;
                    updateUsageUI();
                    if (document.getElementById('soundEnabled').checked) {
                        // Play sound logic here
                    }
                } else {
                    log(`Failed to accept: ${data.message || 'Unknown error'}`, "error");
                }
            } catch(e) { log("Accept error: " + e.message, "error"); }
        }

        function startBot() {
            if (!auth.hash || !auth.token) {
                log("Cannot start: Missing auth credentials.", "error");
                return;
            }
            botRunning = true;
            document.getElementById('btnStart').textContent = "STOP BOT";
            document.getElementById('btnStart').className = "btn-main running";
            log("Autopilot started. Monitoring offers...", "success");
            botLoop();
        }

        function stopBot() {
            botRunning = false;
            clearTimeout(timer);
            document.getElementById('btnStart').textContent = "START BOT";
            document.getElementById('btnStart').className = "btn-main stopped";
            log("Autopilot stopped.", "warn");
        }

        // Persistence
        function saveData() {
            const data = {
                filters: getFilters(),
                settings: getSettings()
            };
            localStorage.setItem('autopilot_data', JSON.stringify(data));
            log("Configuration saved.", "info");
        }

        function loadData() {
            const raw = localStorage.getItem('autopilot_data');
            if (raw) {
                const { filters, settings } = JSON.parse(raw);
                if (filters) {
                    document.getElementById('maxDistance').value = filters.maxDistance;
                    document.getElementById('minPrice').value = filters.minPrice;
                    document.getElementById('dateFrom').value = filters.dateFrom;
                    document.getElementById('dateTo').value = filters.dateTo;
                    document.getElementById('timeFrom').value = filters.timeFrom;
                    document.getElementById('timeTo').value = filters.timeTo;
                    document.getElementById('serviceClass').value = filters.serviceClass;
                    document.getElementById('coordinations').value = filters.coordinations;
                }
                if (settings) {
                    document.getElementById('refreshDelay').value = settings.refreshDelay;
                    document.getElementById('pauseEvery').value = settings.pauseEvery;
                    document.getElementById('pauseDuration').value = settings.pauseDuration;
                    document.getElementById('soundEnabled').checked = settings.soundEnabled;
                }
            }
        }

        function getFilters() {
            return {
                maxDistance: document.getElementById('maxDistance').value,
                minPrice: document.getElementById('minPrice').value,
                dateFrom: document.getElementById('dateFrom').value,
                dateTo: document.getElementById('dateTo').value,
                timeFrom: document.getElementById('timeFrom').value,
                timeTo: document.getElementById('timeTo').value,
                serviceClass: document.getElementById('serviceClass').value,
                coordinations: document.getElementById('coordinations').value
            };
        }

        function getSettings() {
            return {
                refreshDelay: document.getElementById('refreshDelay').value,
                pauseEvery: document.getElementById('pauseEvery').value,
                pauseDuration: document.getElementById('pauseDuration').value,
                soundEnabled: document.getElementById('soundEnabled').checked
            };
        }

        // Init
        document.getElementById('btnStart').addEventListener('click', () => botRunning ? stopBot() : startBot());
        document.getElementById('btnClose').addEventListener('click', () => window.Android && window.Android.closeDialog());

        window.onload = async () => {
            loadData();
            if (await fetchAuth()) {
                await checkSubscription();
                await loadVehicles();
            }
        };
    </script>
</body>
</html>
