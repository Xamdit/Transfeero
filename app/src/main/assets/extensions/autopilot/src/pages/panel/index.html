<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Panel</title>
        <script>
            // Shim for chrome APIs to prevent crashes when running as a regular web page
            window.chrome = window.chrome || {};
            window.chrome.runtime = window.chrome.runtime || {
                sendMessage: function(message, callback) {
                    console.log("Mock sendMessage:", message);
                    if (callback) {
                        // Return default responses for common messages
                        if (message.type === 'subscription-check') {
                            callback({ success: true, status: 'active' });
                        } else if (message.type === 'check-can-accept') {
                            callback({ success: true, data: { allowed: true, usage: { date: new Date().toISOString().split('T')[0], count: 0 }, isSubscribed: true } });
                        } else {
                            callback({ success: true });
                        }
                    }
                },
                lastError: null,
                onMessage: {
                    addListener: function() {},
                    removeListener: function() {}
                }
            };
            window.chrome.tabs = window.chrome.tabs || {
                create: function(obj) {
                    console.log("Mock tabs.create:", obj);
                    window.open(obj.url, '_blank');
                },
                query: function(obj, callback) {
                    if (callback) callback([]);
                }
            };
            window.chrome.storage = window.chrome.storage || {
                local: {
                    get: function(keys, callback) {
                        const result = {};
                        if (typeof keys === 'string') result[keys] = localStorage.getItem(keys);
                        else if (Array.isArray(keys)) keys.forEach(k => result[k] = localStorage.getItem(k));
                        if (callback) callback(result);
                    },
                    set: function(items, callback) {
                        for (let k in items) localStorage.setItem(k, items[k]);
                        if (callback) callback();
                    }
                },
                sync: {
                    get: function(keys, callback) {
                        const result = {};
                        if (typeof keys === 'string') result[keys] = localStorage.getItem('sync_' + keys);
                        if (callback) callback(result);
                    },
                    set: function(items, callback) {
                        for (let k in items) localStorage.setItem('sync_' + k, items[k]);
                        if (callback) callback();
                    }
                }
            };
        </script>
      <script type="module" src="../../../assets/index.html.js"></script>
      <link rel="modulepreload" href="../../../assets/subscriptionService.js">
      <link rel="stylesheet" href="../../../assets/index.css">
    </head>

    <body>
        <div id="__root">
            <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; flex-direction: column; color: #333; background: #f5f5f5;">
                <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">Loading Autopilot...</div>
                <div style="color: #666;">Connecting to system...</div>
            </div>
        </div>
        <script>
            setTimeout(function() {
                var root = document.getElementById('__root');
                if (root && (root.innerText.indexOf("Loading Autopilot...") !== -1)) {
                    root.innerHTML = '<div style="padding: 20px; color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; border-radius: 5px; font-family: sans-serif; margin: 20px;">' +
                        '<h2 style="margin-top: 0;">Initialization Error</h2>' +
                        '<p>The Autopilot UI failed to start. This usually happens if JavaScript modules are blocked or missing.</p>' +
                        '<p style="font-size: 12px; color: #666;">URL: ' + window.location.href + '</p>' +
                        '<button onclick="window.location.reload()" style="padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Try Reloading</button>' +
                        '</div>';
                }
            }, 6000);
        </script>
    </body>
</html>
